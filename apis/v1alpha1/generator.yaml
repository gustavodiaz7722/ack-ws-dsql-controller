ignore:
  resource_names: []
  field_paths:
    # BypassPolicyLockoutSafetyCheck is a safety bypass that allows skipping
    # IAM policy lockout checks. It should not be exposed to end users through
    # the CRD as it could lock the cluster owner out of their own cluster.
    - CreateClusterInput.BypassPolicyLockoutSafetyCheck

resources:
  Cluster:
    ignore_idempotency_token: true
    synced:
      when:
        - path: Status.Status
          in:
            - ACTIVE
            - IDLE
            - INACTIVE
    print:
      order_by: index
      additional_columns:
        - name: ENDPOINT
          json_path: .status.endpoint
          type: string
          index: 0
        - name: ID
          json_path: .status.identifier
          type: string
          index: 1
        - name: STATUS
          json_path: .status.status
          type: string
          index: 2
    fields:
      Identifier:
        is_primary_key: true
      Policy:
        is_iam_policy: true
      DeletionProtectionEnabled:
        late_initialize: {}
        compare:
          pre_delete_include: true
      KMSEncryptionKey:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
    hooks:
      sdk_read_one_post_set_output:
        template_path: hooks/cluster/sdk_read_one_post_set_output.go.tpl
      sdk_update_pre_build_request:
        template_path: hooks/cluster/sdk_update_pre_build_request.go.tpl
    exceptions:
      terminal_codes:
        - ValidationException
